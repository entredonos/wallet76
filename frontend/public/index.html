<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport ───────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── PWA / Theme ───────────────────────────────────────────────── -->
    <meta name="theme-color" content="#09090b" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Favicon ───────────────────────────────────────────────────── -->
    <!-- Google's own favicon guidelines (developers.google.com/search/docs/appearance/favicon-in-search)
         want a square icon that's a multiple of 48px, at least 48x48 —
         we only had 32x32/16x16 declared, which Google can simply refuse
         to use in search results no matter how long it re-crawls (found
         5 jul 2026 after ruling out an indexing-lag explanation). Added a
         96x96 (reusing the existing PWA icon) as the primary candidate;
         kept 32/16 for browser tabs, which prefer the smallest exact fit. -->
    <link rel="icon" type="image/png" sizes="96x96" href="%PUBLIC_URL%/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />

    <!-- ── Apple / iOS ───────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wallet76" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />

    <!-- ── Android / Chrome ──────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Wallet76" />

    <!-- ── SEO / Social ──────────────────────────────────────────────── -->
    <meta name="description" content="Track stocks, ETFs and crypto in one place. Real-time prices, alerts, and multi-wallet support." />
    <meta name="keywords" content="portfolio tracker, stocks, ETF, crypto, investments, wallet" />
    <meta name="author" content="Wallet76" />

    <!-- Canonical — 7 jul 2026: a app está publicada em dois domínios
         (wallet76.com e wallet76.vercel.app, ambos servem o mesmo HTML). Sem
         isto, o Google pode tratar os dois como conteúdo duplicado e dividir
         a força de indexação entre ambos em vez de consolidar tudo em
         wallet76.com — o domínio que queremos que apareça na pesquisa. -->
    <link rel="canonical" href="https://wallet76.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wallet76 — Investment Portfolio Tracker" />
    <meta property="og:description" content="Track stocks, ETFs and crypto in one place. Real-time prices, alerts, and multi-wallet support." />
    <meta property="og:image" content="%PUBLIC_URL%/icon-512x512.png" />
    <meta property="og:url" content="https://wallet76.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Wallet76" />
    <meta name="twitter:description" content="Track stocks, ETFs and crypto in one place." />
    <meta name="twitter:image" content="%PUBLIC_URL%/icon-512x512.png" />

    <!-- ── Structured data (schema.org) ──────────────────────────────────
         Estático no HTML (não injetado via JS) de propósito — 7 jul 2026,
         a app não aparecia a pesquisar "wallet76" no Bing (usado pelo
         Explorer/Edge), cujo crawler é historicamente mais fraco a
         executar JavaScript do que o do Google. Isto dá aos motores de
         busca nome/descrição/logo/tipo de site mesmo que nunca cheguem a
         correr o bundle React. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Wallet76",
            "url": "https://wallet76.com",
            "logo": "https://wallet76.com/icon-512x512.png"
          },
          {
            "@type": "WebSite",
            "name": "Wallet76",
            "url": "https://wallet76.com"
          },
          {
            "@type": "SoftwareApplication",
            "name": "Wallet76",
            "applicationCategory": "FinanceApplication",
            "operatingSystem": "Web, iOS, Android, Windows",
            "url": "https://wallet76.com",
            "description": "Track stocks, ETFs and crypto in one place. Real-time prices, alerts, and multi-wallet support.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "EUR"
            }
          }
        ]
      }
    </script>

    <!-- ── Fonts ──────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <title>Wallet76 | Investment Portfolio</title>

    <!-- DataCloneError suppression -->
    <script>
      window.addEventListener("error", function (e) {
        if (
          e.error instanceof DOMException &&
          e.error.name === "DataCloneError" &&
          e.message &&
          e.message.includes("PerformanceServerTiming")
        ) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    </script>

    <!-- iOS safe area + mobile UX -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
