apply plugin: 'com.android.application'

android {
    namespace "com.wallet76.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.wallet76.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Keystore de debug FIXO (9 jul 2026) — sem isto, cada build no GitHub
    // Actions gera sozinho uma debug.keystore nova e efémera no runner
    // (~/.android/debug.keystore, que não existe de início numa máquina
    // limpa), por isso cada APK saía assinado com uma chave diferente. O
    // Android recusa instalar um APK assinado com chave diferente por cima
    // de uma app já instalada com o mesmo applicationId — dá exatamente o
    // erro "app não instalada" que aconteceu ("nao da para atualizar... diz
    // app nao instalada"). Ao apontar sempre para o mesmo ficheiro
    // debug.keystore (comitado no repo — é seguro, só serve para builds de
    // debug, nunca para a Play Store), todas as build futuras ficam com a
    // MESMA assinatura e passam a atualizar normalmente por cima da
    // anterior. Só não resolve o APK já instalado ANTES desta alteração —
    // esse continua a precisar de uma desinstalação manual uma última vez.
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        // Keystore de PRODUÇÃO para a Play Store (12 jul 2026) — ao contrário
        // do debug.keystore acima, este NUNCA é comitado no repositório. Só
        // existe no runner do GitHub Actions durante o job "build-release"
        // (ver android-build.yml), reconstruído a partir do GitHub Secret
        // ANDROID_RELEASE_KEYSTORE_BASE64. Localmente/nos outros builds estas
        // variáveis de ambiente não existem, por isso este bloco fica vazio e
        // o buildType "release" simplesmente não é assinado (sem erro) —
        // só o job "build-release" no CI é que efetivamente usa isto.
        release {
            if (System.getenv("WALLET76_RELEASE_STORE_FILE")) {
                storeFile file(System.getenv("WALLET76_RELEASE_STORE_FILE"))
                storePassword System.getenv("WALLET76_RELEASE_STORE_PASSWORD")
                keyAlias System.getenv("WALLET76_RELEASE_KEY_ALIAS")
                keyPassword System.getenv("WALLET76_RELEASE_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (System.getenv("WALLET76_RELEASE_STORE_FILE")) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    // 10 jul 2026 — usado pelo SimpleBiometricPlugin.java (gate de biometria
    // próprio, sem CryptoObject, ver comentário nesse ficheiro). Explícito
    // aqui em vez de depender da dependência transitiva do
    // @capgo/capacitor-native-biometric, para não partir se esse plugin for
    // removido do package.json mais tarde.
    implementation "androidx.biometric:biometric:1.1.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
